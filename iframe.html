<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-6zOgOqIrEMZUF+YIdX5WkN+DeJht9AIenfvMJGJQU+zspGDqzncDYbZppXtcTTSy" crossorigin="anonymous"></script>
</head>
<body>
    <div id="connection"></div>
    <script>
        connection = document.querySelector("div")[0]
        socket = io('https://192.168.5.102:5000')
        socket.on('connect', () => {
            console.log('Conectado ao WebSocket');
            connection.innerhtml = "conectado"
        });

        socket.on('connect_error', (err) => {
            console.error('Erro de conexão:', err);
            connection.innerhtml = "erro"
        });

        socket.on('disconnect', () => {
            console.log('Desconectado do WebSocket');
            connection.innerhtml = "desconectado"
        });
        
    </script>
</body>
</html>
